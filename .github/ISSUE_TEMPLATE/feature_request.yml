name: Feature Request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Or Goal
      description: What are you trying to achieve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the expected feature or workflow
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add family-data, graph, sync, export, or UX context if relevant
