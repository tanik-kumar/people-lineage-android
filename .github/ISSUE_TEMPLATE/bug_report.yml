name: Bug Report
description: Report a problem in the Android app or release build
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the problem?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List the steps clearly
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: OnePlus Nord 2 / Android 13 / OxygenOS
  - type: textarea
    id: notes
    attributes:
      label: Extra Notes
