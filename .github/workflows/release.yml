name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          target_commitish: main
          name: People Lineage v1.0.0
          body_path: release-notes/v1.0.0.md
          files: release-assets/people-lineage-v1.0.0-release.apk
