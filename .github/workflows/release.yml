name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: People Lineage v${{ github.ref_name }}
          body_path: release-notes/${{ github.ref_name }}.md
          files: release-assets/people-lineage-v1.0.0-release.apk
