name: Repo Metadata

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Update repository description
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: context.repo.repo,
              description: 'Offline-first Android app for village-wise family lineage and people records.',
              homepage: 'https://github.com/tanik-kumar/people-lineage-android/releases/tag/v1.0.0'
            })

      - name: Update repository topics
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: ['android', 'kotlin', 'family-tree', 'genealogy', 'lineage', 'room', 'compose']
            })
